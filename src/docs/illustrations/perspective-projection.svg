<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420" font-family="monospace, sans-serif">
  <rect width="760" height="420" fill="#0d1117"/>
  <text x="380" y="28" fill="#e6edf3" font-size="15" font-weight="bold" text-anchor="middle">Projection perspective — 3D → 2D</text>

  <!-- Screen plane (z=1 reference) -->
  <rect x="260" y="55" width="6" height="300" rx="2" fill="#388bfd" opacity="0.8"/>
  <text x="268" y="50" fill="#388bfd" font-size="11">plan de projection (z=1)</text>
  <!-- Screen border -->
  <rect x="260" y="55" width="120" height="200" rx="4" fill="none" stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="320" y="273" fill="#58a6ff" font-size="10" text-anchor="middle">écran</text>

  <!-- Observer (camera) at z=0 -->
  <circle cx="100" cy="155" r="12" fill="#f78166"/>
  <text x="100" y="182" fill="#f78166" font-size="11" text-anchor="middle">caméra</text>
  <text x="100" y="195" fill="#6e7681" font-size="9" text-anchor="middle">z = 0</text>

  <!-- Star far (high z) -->
  <circle cx="580" cy="100" r="7" fill="rgb(200,215,255)"/>
  <circle cx="580" cy="100" r="12" fill="rgba(200,215,255,0.2)"/>
  <text x="600" y="95" fill="#cdd9e5" font-size="10">étoile A</text>
  <text x="600" y="109" fill="#6e7681" font-size="9">z = 2.0 (lointaine)</text>

  <!-- Star near (low z) -->
  <circle cx="430" cy="260" r="12" fill="rgb(255,140,80)"/>
  <circle cx="430" cy="260" r="22" fill="rgba(255,140,80,0.25)"/>
  <circle cx="430" cy="260" r="32" fill="rgba(255,140,80,0.1)"/>
  <text x="450" y="255" fill="#ffa657" font-size="10">étoile B</text>
  <text x="450" y="269" fill="#6e7681" font-size="9">z = 0.5 (proche)</text>

  <!-- Projection ray for star A -->
  <line x1="100" y1="155" x2="580" y2="100" stroke="#8b949e" stroke-width="1" stroke-dasharray="6,4"/>
  <!-- Projected point A on screen -->
  <circle cx="266" cy="138" r="3" fill="rgb(200,215,255)"/>
  <line x1="266" y1="138" x2="266" y2="155" stroke="#388bfd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="240" y="135" fill="#79c0ff" font-size="9" text-anchor="end">pxA</text>

  <!-- Projection ray for star B -->
  <line x1="100" y1="155" x2="430" y2="260" stroke="#8b949e" stroke-width="1" stroke-dasharray="6,4"/>
  <!-- Projected point B on screen -->
  <circle cx="266" cy="210" r="5" fill="rgb(255,140,80)"/>
  <line x1="266" y1="210" x2="266" y2="155" stroke="#388bfd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="240" y="207" fill="#ffa657" font-size="9" text-anchor="end">pxB</text>

  <!-- Center line -->
  <line x1="100" y1="155" x2="680" y2="155" stroke="#30363d" stroke-width="1" stroke-dasharray="3,4"/>
  <text x="685" y="159" fill="#6e7681" font-size="9">axe Z</text>

  <!-- cy center mark -->
  <line x1="256" y1="155" x2="276" y2="155" stroke="#e6edf3" stroke-width="1.5"/>
  <text x="240" y="159" fill="#e6edf3" font-size="9" text-anchor="end">cy</text>

  <!-- Depth markers -->
  <line x1="100" y1="320" x2="100" y2="330" stroke="#6e7681" stroke-width="1"/>
  <line x1="266" y1="320" x2="266" y2="330" stroke="#6e7681" stroke-width="1"/>
  <line x1="430" y1="320" x2="430" y2="330" stroke="#6e7681" stroke-width="1"/>
  <line x1="580" y1="320" x2="580" y2="330" stroke="#6e7681" stroke-width="1"/>
  <line x1="100" y1="325" x2="580" y2="325" stroke="#6e7681" stroke-width="1"/>
  <text x="183" y="345" fill="#388bfd" font-size="9" text-anchor="middle">z=1 (écran)</text>
  <text x="100" y="345" fill="#f78166" font-size="9" text-anchor="middle">z=0</text>
  <text x="430" y="345" fill="#ffa657" font-size="9" text-anchor="middle">z=0.5</text>
  <text x="580" y="345" fill="#79c0ff" font-size="9" text-anchor="middle">z=2.0</text>

  <!-- Formulas panel -->
  <rect x="480" y="310" width="270" height="98" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="495" y="330" fill="#8b949e" font-size="11" font-weight="bold">Formules :</text>
  <text x="495" y="350" fill="#79c0ff" font-size="11">px = cx + (x/z) × Sx</text>
  <text x="495" y="368" fill="#79c0ff" font-size="11">py = cy + (y/z) × Sy</text>
  <text x="495" y="386" fill="#ffa657" font-size="11">Lapp = clamp(b/z², 0, 1)</text>
  <text x="495" y="402" fill="#56d364" font-size="11">r = clamp(s/z, 0.4, 8) px</text>

  <!-- Apparent size comparison -->
  <text x="380" y="378" fill="#8b949e" font-size="10" text-anchor="middle">Taille apparente : étoile proche (B) >> étoile lointaine (A)</text>
</svg>
