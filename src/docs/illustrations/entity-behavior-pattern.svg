<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380" font-family="monospace, sans-serif">
  <rect width="760" height="380" fill="#0d1117"/>
  <text x="380" y="30" fill="#e6edf3" font-size="15" font-weight="bold" text-anchor="middle">Pattern Entity / Behavior — Composition</text>

  <!-- Entity box -->
  <rect x="40" y="60" width="180" height="230" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="2"/>
  <rect x="40" y="60" width="180" height="36" rx="8" fill="#1f6feb"/>
  <rect x="40" y="84" width="180" height="12" fill="#1f6feb"/>
  <text x="130" y="84" fill="#e6edf3" font-size="13" font-weight="bold" text-anchor="middle">Entity</text>
  <line x1="40" y1="96" x2="220" y2="96" stroke="#388bfd" stroke-width="1"/>
  <text x="55" y="114" fill="#79c0ff" font-size="10">+ x, y : double</text>
  <text x="55" y="130" fill="#79c0ff" font-size="10">+ width, height : double</text>
  <text x="55" y="146" fill="#79c0ff" font-size="10">+ dx, dy : double</text>
  <line x1="40" y1="155" x2="220" y2="155" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="55" y="172" fill="#cdd9e5" font-size="10">- behaviors : List</text>
  <line x1="40" y1="182" x2="220" y2="182" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="55" y="200" fill="#3fb950" font-size="10">+ addBehavior(b)</text>
  <text x="55" y="218" fill="#3fb950" font-size="10">+ update(dt)</text>
  <text x="55" y="236" fill="#3fb950" font-size="10">+ draw(g2)</text>
  <line x1="40" y1="246" x2="220" y2="246" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="55" y="266" fill="#8b949e" font-size="9">for b in behaviors:</text>
  <text x="65" y="280" fill="#8b949e" font-size="9">b.update(this, dt)</text>

  <!-- behaviors list connector -->
  <line x1="220" y1="168" x2="290" y2="168" stroke="#58a6ff" stroke-width="2" marker-end="url(#adiamond)"/>
  <text x="238" y="162" fill="#8b949e" font-size="9">0..*</text>

  <!-- Behavior interface box -->
  <rect x="290" y="60" width="160" height="110" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="290" y="60" width="160" height="36" rx="8" fill="#21262d"/>
  <rect x="290" y="84" width="160" height="12" fill="#21262d"/>
  <text x="370" y="79" fill="#8b949e" font-size="10" text-anchor="middle">«interface»</text>
  <text x="370" y="92" fill="#e6edf3" font-size="13" font-weight="bold" text-anchor="middle">Behavior</text>
  <line x1="290" y1="96" x2="450" y2="96" stroke="#58a6ff" stroke-width="1"/>
  <text x="305" y="116" fill="#3fb950" font-size="10">+ update(entity, dt)</text>
  <text x="305" y="134" fill="#3fb950" font-size="10">+ draw(entity, g2)</text>
  <text x="305" y="152" fill="#8b949e" font-size="9">«abstract»</text>

  <!-- StarfieldBehavior box -->
  <rect x="530" y="50" width="200" height="140" rx="8" fill="#161b22" stroke="#56d364" stroke-width="2"/>
  <rect x="530" y="50" width="200" height="36" rx="8" fill="#238636"/>
  <rect x="530" y="74" width="200" height="12" fill="#238636"/>
  <text x="630" y="74" fill="#e6edf3" font-size="12" font-weight="bold" text-anchor="middle">StarfieldBehavior</text>
  <line x1="530" y1="86" x2="730" y2="86" stroke="#56d364" stroke-width="1"/>
  <text x="545" y="104" fill="#79c0ff" font-size="9">- sx[], sy[], sz[] : double[]</text>
  <text x="545" y="118" fill="#79c0ff" font-size="9">- velYaw, velPitch, velRoll</text>
  <text x="545" y="132" fill="#79c0ff" font-size="9">- starColor[] : Color[]</text>
  <line x1="530" y1="140" x2="730" y2="140" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="545" y="158" fill="#3fb950" font-size="9">+ update(entity, dt)</text>
  <text x="545" y="172" fill="#3fb950" font-size="9">+ draw(entity, g2)</text>

  <!-- implements arrow -->
  <line x1="530" y1="115" x2="450" y2="115" stroke="#56d364" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrtriangle)"/>
  <text x="480" y="109" fill="#56d364" font-size="9">implements</text>

  <!-- Future behavior box (dashed, future) -->
  <rect x="530" y="230" width="200" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="630" y="265" fill="#6e7681" font-size="12" font-weight="bold" text-anchor="middle">MeteorBehavior</text>
  <text x="630" y="283" fill="#6e7681" font-size="10" text-anchor="middle">«futur»</text>
  <line x1="530" y1="270" x2="450" y2="145" stroke="#30363d" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrfuture)"/>

  <!-- Frame rate annotation -->
  <rect x="40" y="315" width="680" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="335" fill="#8b949e" font-size="11" text-anchor="middle">Chaque frame : Timer(16ms) → entity.update(Δt) → [b1.update, b2.update, ...] → panel.repaint() → entity.draw(g2) → [b1.draw, b2.draw, ...]</text>
  <text x="380" y="354" fill="#6e7681" font-size="10" text-anchor="middle">L'ordre d'exécution suit l'ordre d'insertion dans la liste behaviors</text>

  <defs>
    <marker id="adiamond" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,5 5,0 10,5 5,10" fill="#58a6ff"/>
    </marker>
    <marker id="arrtriangle" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 0,10 10,5" fill="none" stroke="#56d364" stroke-width="1.5"/>
    </marker>
    <marker id="arrfuture" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0,0 0,6 8,3" fill="none" stroke="#30363d" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
