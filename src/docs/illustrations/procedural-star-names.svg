<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffeecc" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffd9a0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd9a0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="760" height="360" fill="#05070d"/>

  <!-- title -->
  <text x="380" y="26" fill="#e8e8e8" font-size="16" text-anchor="middle" font-weight="bold">
    Génération procédurale : du SEED à l'étiquette de nom
  </text>

  <!-- pipeline -->
  <g font-size="12">
    <rect x="30" y="60" width="130" height="46" rx="8" fill="#14202e" stroke="#4a6a8a"/>
    <text x="95" y="79" fill="#cfe4ff" text-anchor="middle">config.properties</text>
    <text x="95" y="96" fill="#8fb8e8" text-anchor="middle">app.stars.seed = 42</text>

    <line x1="160" y1="83" x2="215" y2="83" stroke="#6a8aae" marker-end="url(#arr)"/>

    <rect x="220" y="60" width="150" height="46" rx="8" fill="#14202e" stroke="#4a6a8a"/>
    <text x="295" y="79" fill="#cfe4ff" text-anchor="middle">subSeed(seed, n)</text>
    <text x="295" y="96" fill="#8fb8e8" text-anchor="middle">SplitMix64</text>

    <line x1="370" y1="83" x2="425" y2="83" stroke="#6a8aae"/>

    <rect x="430" y="60" width="140" height="46" rx="8" fill="#14202e" stroke="#4a6a8a"/>
    <text x="500" y="79" fill="#cfe4ff" text-anchor="middle">Random(subSeed)</text>
    <text x="500" y="96" fill="#8fb8e8" text-anchor="middle">étoile n° n</text>

    <line x1="570" y1="83" x2="625" y2="83" stroke="#6a8aae"/>

    <rect x="630" y="48" width="110" height="72" rx="8" fill="#14202e" stroke="#4a6a8a"/>
    <text x="685" y="68" fill="#cfe4ff" text-anchor="middle">position x,y,z</text>
    <text x="685" y="85" fill="#cfe4ff" text-anchor="middle">type spectral</text>
    <text x="685" y="102" fill="#ffd9a0" text-anchor="middle">nom (25 %)</text>
  </g>

  <!-- separator -->
  <line x1="30" y1="140" x2="730" y2="140" stroke="#223044" stroke-dasharray="4 4"/>

  <!-- far star, no label -->
  <circle cx="120" cy="220" r="1.5" fill="#ffb478"/>
  <text x="120" y="255" fill="#5a6a80" font-size="11" text-anchor="middle">z = 1.4 — trop loin</text>
  <text x="120" y="270" fill="#5a6a80" font-size="11" text-anchor="middle">(pas d'étiquette)</text>

  <!-- mid star, faint label -->
  <circle cx="330" cy="215" r="3" fill="#ffd9a0"/>
  <g opacity="0.45">
    <rect x="341" y="206" width="64" height="17" fill="#262a30" fill-opacity="0.59" stroke="#555a64"/>
    <text x="345" y="218" fill="#ffffff" font-size="9">Velthar IV</text>
  </g>
  <text x="330" y="255" fill="#5a6a80" font-size="11" text-anchor="middle">z = 0.75 — approche</text>
  <text x="330" y="270" fill="#5a6a80" font-size="11" text-anchor="middle">fondu partiel</text>

  <!-- near star, full label with anatomy callouts -->
  <circle cx="560" cy="210" r="14" fill="url(#glow)"/>
  <circle cx="560" cy="210" r="6" fill="#ffeecc"/>
  <rect x="578" y="200" width="76" height="18" fill="#262a30" fill-opacity="0.59" stroke="#555a64"/>
  <text x="582" y="213" fill="#ffffff" font-size="9">Alpha Kethris</text>
  <text x="560" y="255" fill="#5a6a80" font-size="11" text-anchor="middle">z = 0.40 — proche</text>
  <text x="560" y="270" fill="#5a6a80" font-size="11" text-anchor="middle">étiquette pleinement visible</text>

  <!-- callouts -->
  <g font-size="10" fill="#8fb8e8">
    <line x1="654" y1="204" x2="700" y2="180" stroke="#3a4a5e"/>
    <text x="703" y="178">cadre gris foncé</text>
    <line x1="616" y1="220" x2="660" y2="300" stroke="#3a4a5e"/>
    <text x="600" y="315">fond gris foncé translucide (α ≈ 150)</text>
    <line x1="590" y1="207" x2="480" y2="300" stroke="#3a4a5e"/>
    <text x="380" y="315">texte blanc, police 9 pt</text>
  </g>
</svg>
