<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="sans-serif">
  <defs>
    <radialGradient id="puff" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cddaff" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#cddaff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#cddaff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hii" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaac3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffaac3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="760" height="400" fill="#05070d"/>

  <text x="380" y="26" fill="#e8e8e8" font-size="16" text-anchor="middle" font-weight="bold">
    Nuages de Magellan procéduraux — puffs sur la sphère céleste
  </text>

  <!-- LMC: large irregular cluster of puffs -->
  <g opacity="0.85">
    <ellipse cx="240" cy="180" rx="60" ry="34" fill="url(#puff)" transform="rotate(-20 240 180)"/>
    <ellipse cx="280" cy="160" rx="45" ry="28" fill="url(#puff)" transform="rotate(-15 280 160)"/>
    <ellipse cx="200" cy="200" rx="40" ry="24" fill="url(#puff)" transform="rotate(-25 200 200)"/>
    <ellipse cx="255" cy="205" rx="34" ry="22" fill="url(#puff)"/>
    <ellipse cx="305" cy="185" rx="26" ry="18" fill="url(#puff)"/>
    <ellipse cx="180" cy="165" rx="26" ry="17" fill="url(#puff)"/>
    <circle cx="290" cy="170" r="7" fill="url(#hii)"/>
    <circle cx="222" cy="192" r="6" fill="url(#hii)"/>
    <circle cx="255" cy="150" r="5" fill="url(#hii)"/>
  </g>
  <text x="240" y="265" fill="#8fb8e8" font-size="12" text-anchor="middle">Grand Nuage (LMC)</text>
  <text x="240" y="281" fill="#5a6a80" font-size="10" text-anchor="middle">120 puffs, rayon angulaire 0.22 rad, aplatissement 0.55</text>

  <!-- Bridge -->
  <g opacity="0.4">
    <ellipse cx="360" cy="205" rx="18" ry="10" fill="url(#puff)" transform="rotate(15 360 205)"/>
    <ellipse cx="405" cy="218" rx="16" ry="9" fill="url(#puff)" transform="rotate(15 405 218)"/>
    <ellipse cx="450" cy="228" rx="15" ry="9" fill="url(#puff)" transform="rotate(12 450 228)"/>
    <ellipse cx="495" cy="238" rx="14" ry="8" fill="url(#puff)" transform="rotate(10 495 238)"/>
  </g>
  <text x="430" y="190" fill="#5a6a80" font-size="10" text-anchor="middle">pont de Magellan — 30 puffs très diffus</text>
  <line x1="430" y1="196" x2="428" y2="215" stroke="#3a4a5e"/>

  <!-- SMC -->
  <g opacity="0.8">
    <ellipse cx="565" cy="255" rx="36" ry="24" fill="url(#puff)" transform="rotate(20 565 255)"/>
    <ellipse cx="590" cy="245" rx="26" ry="18" fill="url(#puff)" transform="rotate(18 590 245)"/>
    <ellipse cx="545" cy="270" rx="22" ry="15" fill="url(#puff)"/>
    <circle cx="575" cy="252" r="5" fill="url(#hii)"/>
  </g>
  <text x="570" y="320" fill="#8fb8e8" font-size="12" text-anchor="middle">Petit Nuage (SMC)</text>
  <text x="570" y="336" fill="#5a6a80" font-size="10" text-anchor="middle">70 puffs, rayon 0.13 rad, à 0.60 rad du LMC</text>

  <!-- annotations -->
  <g font-size="10" fill="#8fb8e8">
    <line x1="290" y1="170" x2="360" y2="90" stroke="#3a4a5e"/>
    <text x="365" y="88">régions HII roses (sprite « pink »)</text>
    <line x1="200" y1="120" x2="180" y2="152" stroke="#3a4a5e"/>
    <text x="120" y="112">sprite radial 32×32,</text>
    <text x="120" y="126">alpha 0.06–0.11 par puff</text>
  </g>

  <!-- footer: pipeline note -->
  <text x="380" y="378" fill="#5a6a80" font-size="11" text-anchor="middle">
    Directions unitaires générées via Random(subSeed(seed, −1)) — rotation caméra partagée (CameraState), aucun travel : fond fixe à l'infini
  </text>
</svg>
