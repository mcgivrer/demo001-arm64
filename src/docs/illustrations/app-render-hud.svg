<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" font-family="monospace, sans-serif">
  <!-- Mockup of the actual OpenGL render (RenderContext/GLWindow): black background + starfield + thrust HUD overlay -->
  <rect width="800" height="600" fill="#000000"/>

  <!-- Scattered stars, colours sampled from the Harvard spectral classes (see ch.04) -->
  <circle cx="120" cy="90"  r="1.1" fill="#ff8c50"/>
  <circle cx="180" cy="260" r="1.4" fill="#ffb96e"/>
  <circle cx="260" cy="430" r="1.0" fill="#ff8c50"/>
  <circle cx="340" cy="150" r="1.6" fill="#ffebc3"/>
  <circle cx="400" cy="60"  r="1.1" fill="#ff8c50"/>
  <circle cx="460" cy="330" r="1.8" fill="#f5f5ff"/>
  <circle cx="520" cy="500" r="1.0" fill="#ffb96e"/>
  <circle cx="560" cy="200" r="1.3" fill="#ff8c50"/>
  <circle cx="610" cy="110" r="1.0" fill="#ffb96e"/>
  <circle cx="650" cy="420" r="1.2" fill="#ff8c50"/>
  <circle cx="700" cy="270" r="1.5" fill="#c8d7ff"/>
  <circle cx="740" cy="160" r="1.0" fill="#ff8c50"/>
  <circle cx="90"  cy="380" r="1.0" fill="#ffb96e"/>
  <circle cx="230" cy="60"  r="1.0" fill="#ff8c50"/>
  <circle cx="300" cy="540" r="1.1" fill="#ff8c50"/>
  <circle cx="500" cy="120" r="1.0" fill="#ffb96e"/>
  <circle cx="620" cy="540" r="1.1" fill="#ff8c50"/>
  <circle cx="370" cy="380" r="1.0" fill="#ffb96e"/>
  <circle cx="440" cy="470" r="1.3" fill="#ff8c50"/>
  <circle cx="150" cy="520" r="1.0" fill="#ffb96e"/>

  <!-- A bright nearby O/B-class star with diffuse glow, near screen centre -->
  <circle cx="420" cy="290" r="14" fill="#aab4ff" opacity="0.12"/>
  <circle cx="420" cy="290" r="3.2" fill="#c8d7ff"/>

  <!-- A close warm star lower-right, mid brightness -->
  <circle cx="610" cy="430" r="7" fill="#ffb96e" opacity="0.15"/>
  <circle cx="610" cy="430" r="2.2" fill="#ffd8a8"/>

  <!-- === Thrust HUD — bottom-left, matches StarfieldBehavior.drawThrustHud() === -->
  <!-- GAUGE_X=20  GAUGE_WIDTH=14  GAUGE_HEIGHT=100  GAUGE_MARGIN=64 (from panel bottom) -->
  <rect x="20" y="436" width="14" height="100" fill="none" stroke="#ffffff" stroke-opacity="0.43" stroke-width="1.4"/>
  <!-- fill at ~50% (cruise power, enginePower = 0.5) — yellow zone -->
  <rect x="21" y="486" width="12" height="50" fill="#ffe146"/>
  <text x="44" y="540" fill="#ffffff" font-size="13">35.00 pc/s</text>

  <!-- === Controls help panel — bottom-right, matches StarfieldBehavior.drawControlsHelp() === -->
  <!-- HELP_WIDTH=250  HELP_MARGIN=60 (from panel right/bottom)  boxHeight=22+8*16=150 -->
  <rect x="490" y="390" width="250" height="150" rx="10" fill="#0f121a" fill-opacity="0.55"/>
  <rect x="490" y="390" width="250" height="150" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.27" stroke-width="1"/>
  <text x="502" y="407" fill="#ffffff" font-size="12" font-weight="bold">Controles (H)</text>
  <g font-size="11">
    <text x="502" y="423" fill="#a0c8ff">←→ / A D</text>      <text x="600" y="423" fill="#dcdcdc">Yaw</text>
    <text x="502" y="439" fill="#a0c8ff">↑↓ / W S</text>      <text x="600" y="439" fill="#dcdcdc">Pitch</text>
    <text x="502" y="455" fill="#a0c8ff">Q / E</text>          <text x="600" y="455" fill="#dcdcdc">Roll</text>
    <text x="502" y="471" fill="#a0c8ff">SPACE</text>          <text x="600" y="471" fill="#dcdcdc">Frein</text>
    <text x="502" y="487" fill="#a0c8ff">Clic + glisser</text><text x="600" y="487" fill="#dcdcdc">Joystick</text>
    <text x="502" y="503" fill="#a0c8ff">CTRL / SHIFT</text>  <text x="600" y="503" fill="#dcdcdc">Thrust +/-</text>
    <text x="502" y="519" fill="#a0c8ff">ESCAPE</text>         <text x="600" y="519" fill="#dcdcdc">Quitter</text>
    <text x="502" y="535" fill="#a0c8ff">H</text>              <text x="600" y="535" fill="#dcdcdc">Afficher/masquer l'aide</text>
  </g>

  <!-- caption -->
  <rect x="0" y="566" width="800" height="34" fill="#0d1117"/>
  <text x="400" y="588" fill="#8b949e" font-size="12" text-anchor="middle">Rendu GL (RenderContext) — champ d'étoiles + HUD de propulsion + grille d'aide des contrôles (touche H)</text>
</svg>
