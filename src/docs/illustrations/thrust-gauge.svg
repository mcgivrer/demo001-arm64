<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" font-family="monospace, sans-serif">
  <rect width="760" height="320" fill="#0d1117"/>
  <text x="380" y="30" fill="#e6edf3" font-size="15" font-weight="bold" text-anchor="middle">HUD de propulsion — jauge de puissance et vitesse</text>

  <!-- === Panel: idle === -->
  <rect x="20" y="50" width="220" height="240" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="130" y="75" fill="#79c0ff" font-size="13" font-weight="bold" text-anchor="middle">enginePower = 0.0</text>
  <text x="130" y="91" fill="#8b949e" font-size="10" text-anchor="middle">CTRL/SHIFT relâchés au minimum</text>
  <rect x="100" y="120" width="14" height="100" fill="none" stroke="#ffffff" stroke-opacity="0.43" stroke-width="1.5"/>
  <text x="130" y="245" fill="#8b949e" font-size="10" text-anchor="middle">jauge vide</text>
  <text x="130" y="262" fill="#56d364" font-size="12" text-anchor="middle">0.00 pc/s</text>

  <!-- === Panel: cruise (default) === -->
  <rect x="270" y="50" width="220" height="240" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="75" fill="#ffe146" font-size="13" font-weight="bold" text-anchor="middle">enginePower = 0.5</text>
  <text x="380" y="91" fill="#8b949e" font-size="10" text-anchor="middle">puissance de croisière initiale</text>
  <rect x="350" y="120" width="14" height="100" fill="none" stroke="#ffffff" stroke-opacity="0.43" stroke-width="1.5"/>
  <rect x="351" y="170" width="12" height="50" fill="#ffe146"/>
  <text x="380" y="245" fill="#8b949e" font-size="10" text-anchor="middle">jauge à mi-hauteur</text>
  <text x="380" y="262" fill="#ffe146" font-size="12" text-anchor="middle">35.00 pc/s</text>

  <!-- === Panel: full thrust === -->
  <rect x="520" y="50" width="220" height="240" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="630" y="75" fill="#ff4646" font-size="13" font-weight="bold" text-anchor="middle">enginePower = 1.0</text>
  <text x="630" y="91" fill="#8b949e" font-size="10" text-anchor="middle">CTRL maintenu jusqu'au plafond</text>
  <rect x="600" y="120" width="14" height="100" fill="none" stroke="#ffffff" stroke-opacity="0.43" stroke-width="1.5"/>
  <rect x="601" y="121" width="12" height="99" fill="#ff4646"/>
  <text x="630" y="245" fill="#8b949e" font-size="10" text-anchor="middle">jauge pleine</text>
  <text x="630" y="262" fill="#ff4646" font-size="12" text-anchor="middle">70.00 pc/s</text>

  <!-- Bottom note -->
  <rect x="20" y="296" width="720" height="0" fill="none"/>
  <text x="380" y="308" fill="#6e7681" font-size="9" text-anchor="middle">vitesse = enginePower × MAX_SPEED_PARSEC (70.0)  —  couleur : cyan (idle) → jaune (croisière) → rouge (plein régime)</text>
</svg>
